<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foodie Express - Contact</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff8f0;
    }

    header {
      background: #ff5722;
      color: white;
      text-align: center;
      padding: 15px 0;
    }

    nav {
      background: #222;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    .contact-section {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .contact-section h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    form input, form textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    form button {
      width: 100%;
      padding: 12px;
      background: #ff5722;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
    }

    .info {
      text-align: center;
      margin-top: 20px;
      color: #555;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Foodie Express</h1>
    <p>Contact Us</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="contact.html">Contact</a>
  </nav>

  <section class="contact-section">
    <h2>Get in Touch</h2>
    <form>
      <input type="text" placeholder="Enter your name" required>
      <input type="email" placeholder="Enter your email" required>
      <textarea rows="5" placeholder="Enter your message" required></textarea>
      <button type="submit">Send Message</button>
    </form>

    <div class="info">
      <p>Email: support@foodieexpress.com</p>
      <p>Phone: +91 9876543210</p>
      <p>Address: Pune, Maharashtra, India</p>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Foodie Express | All Rights Reserved</p>
  </footer>

</body>
</html>
