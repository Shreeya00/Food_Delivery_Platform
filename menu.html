<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #ff4d4d;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        nav {
            background: #222;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 20px 0;
        }

        h2 {
            margin-top: 30px;
            border-left: 5px solid #ff4d4d;
            padding-left: 10px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card-body {
            padding: 10px;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
        }

        .price {
            color: #ff4d4d;
            font-weight: bold;
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 8px;
            background: #ff4d4d;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e60000;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>Online Food Menu</header>

<nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="about.html">About</a>
    <a href="offers.html">Offers</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

    <!-- Starters -->
    <h2>Starters</h2>
    <div class="menu-grid">
        <div class="card">
            <img src="https://source.unsplash.com/300x200/?spring-roll" alt="">
            <div class="card-body">
                <div class="card-title">Spring Rolls</div>
                <div class="price">₹150</div>
                <button>Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/300x200/?soup" alt="">
            <div class="card-body">
                <div class="card-title">Tomato Soup</div>
                <div class="price">₹120</div>
                <button>Add to Cart</button>
            </div>
        </div>
    </div>

    <!-- Main Course -->
    <h2>Main Course</h2>
    <div class="menu-grid">
        <div class="card">
            <img src="https://source.unsplash.com/300x200/?pizza" alt="">
            <div class="card-body">
                <div class="card-title">Margherita Pizza</div>
                <div class="price">₹300</div>
                <button>Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/300x200/?burger" alt="">
            <div class="card-body">
                <div class="card-title">Veg Burger</div>
                <div class="price">₹180</div>
                <button>Add to Cart</button>
            </div>
        </div>
    </div>

    <!-- Desserts -->
    <h2>Desserts</h2>
    <div class="menu-grid">
        <div class="card">
            <img src="https://source.unsplash.com/300x200/?ice-cream" alt="">
            <div class="card-body">
                <div class="card-title">Ice Cream</div>
                <div class="price">₹100</div>
                <button>Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/300x200/?cake" alt="">
            <div class="card-body">
                <div class="card-title">Chocolate Cake</div>
                <div class="price">₹200</div>
                <button>Add to Cart</button>
            </div>
        </div>
    </div>

</div>

<footer>
    <p>&copy; 2026 Foodie Express | All Rights Reserved</p>
</footer>

</body>
</html>
